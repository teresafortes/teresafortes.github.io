short_bio: >-
  <p>
    Hi! I'm a Software Engineering Ph.D. student in the CMU-Portugal Dual PhD programme,
    conducting research at the <a href="https://s3d.cmu.edu/" target="_blank">Software and Societal Systems Department</a>
    in the <a href="https://www.cs.cmu.edu/" target="_blank">School of Computer Science</a> at
    <a href="https://www.cmu.edu/" target="_blank">Carnegie Mellon University</a>, and at the
    <a href="https://www.up.pt/feup/pt/" target="_blank">Faculty of Engineering of the University of Porto</a>, where I'm a member of the
    <a href="https://tqrg.github.io" target="_blank">TQRG (The Quasar Research Group)</a>.
    My work sits at the intersection of formal
    reasoning and large language models, advised by
    <a href="https://ruimaranhao.com" target="_blank">Dr. Rui Abreu</a> and
    <a href="https://www.cs.cmu.edu/~aldrich/" target="_blank">Dr. Jonathan Aldrich</a>.
  </p>
  <p class="p-2 px-3 rounded" style="background-color: #eef6fc;">
    I'm always open to collaborations. Feel free to reach out to me at
    <a href="mailto:%74%66%6F%72%74%65%73@%61%6E%64%72%65%77.%63%6D%75.%65%64%75">tfortes(at)andrew(dot)cmu(dot)edu</a>.
  </p>

